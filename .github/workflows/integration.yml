name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration-test:
    name: Sandbox Integration Tests
    runs-on: ubuntu-latest
    env:
      SHOPEE_SANDBOX_PARTNER_ID: ${{ secrets.SHOPEE_SANDBOX_PARTNER_ID }}
      SHOPEE_SANDBOX_PARTNER_KEY: ${{ secrets.SHOPEE_SANDBOX_PARTNER_KEY }}
      SHOPEE_SANDBOX_ACCOUNT: ${{ secrets.SHOPEE_SANDBOX_ACCOUNT }}
      SHOPEE_SANDBOX_PASSWORD: ${{ secrets.SHOPEE_SANDBOX_PASSWORD }}
      SHOPEE_SANDBOX_SHOP_ID: ${{ secrets.SHOPEE_SANDBOX_SHOP_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

      - name: Install Playwright Chromium and dependencies
        if: ${{ env.SHOPEE_SANDBOX_PARTNER_ID != '' }}
        run: npx playwright install --with-deps chromium

      - name: Run sandbox integration tests
        if: ${{ env.SHOPEE_SANDBOX_PARTNER_ID != '' }}
        run: npm run test:sandbox
